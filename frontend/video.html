<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title><# videoTitle> - LocalTube</title>
  <style>
    <# commonCSS>
    body { margin: 0;  }
    .video-section { background: #000; width: 100%; display: flex; justify-content: center; align-items: center; min-height: 80vh; position: relative; }
    video { max-width: 100%; max-height: 80vh; height: auto; width: auto; }
    .subtitle-overlay { position: absolute; bottom: 60px; left: 0; right: 0; text-align: center; pointer-events: none; }
    .subtitle-cue { background: rgba(0,0,0,0.7); color: white; font-size: 1.3em; padding: 4px 8px; border-radius: 4px; display: inline-block; white-space: pre-wrap; }
    .subtitle-cue .word.spoken { color: white; }
    .subtitle-cue .word.unspoken { color: rgba(255,255,255,0.4); }
    video::cue { visibility: hidden; }
    .video-modal { position: absolute; z-index: 1; top: 20%; width: 100%; text-align: center; }
    .video-modal-text { background: rgba(0,0,0,.5); color: #eeeeee; font-size: 1.3em; display: none; }
    .video-title { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
    .channel-info { display: flex; align-items: center; margin-bottom: 15px; }
    .channel-avatar { border-radius: 50%; margin-right: 10px; }
    .user-visibility-list { margin-bottom: 15px; padding: 12px 14px; background: #fafafa; border: 1px solid #eee; border-radius: 6px; }
    .user-visibility-list h3 { margin: 0 0 8px; font-size: 14px; color: #555; font-weight: 600; }
    .user-visibility-row { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
    .user-visibility-row .vis-username { font-weight: bold; min-width: 120px; }
    .user-visibility-row .vis-status { color: #666; flex: 1; }
    .visibility-toggle { background: white; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; padding: 2px 10px; font-size: 16px; line-height: 1.2; min-width: 32px; }
    .visibility-toggle:hover { background: #f0f0f0; }
    .visibility-toggle:disabled { cursor: wait; opacity: 0.5; }
    .visibility-toggle.add { color: #2e7d32; border-color: #2e7d32; }
    .visibility-toggle.remove { color: #c62828; border-color: #c62828; }
  </style>
</head>
<body>
  <div class="content-section">
    <div class="header">
      <a href="/" class="back-link">← Back to Home</a>
      <# topRightBlock>
    </div>
  </div>
  <div class="video-section">
    <video controls autoplay>
      <source src="/media/videos/<# videoId>.<# videoExt>" type="video/<# videoExt>">
      <#foreach subtitle of subtitles>
        <track kind="subtitles" src="/media/subtitles/<# videoId>/<# subtitle.lang>" srclang="<# subtitle.lang>" label="<# subtitle.lang>">
      </#foreach>
    </video>
    <div class="subtitle-overlay"></div>
    <div class="video-modal"><span class="video-modal-text"></span></div>
  </div>
  <script>
    const video = document.querySelector('video');
    const overlay = document.querySelector('.subtitle-overlay');

    function parseVTT(text) {
      const cues = [];
      const blocks = text
        .replace(/^\uFEFF/, '')
        .replaceAll('&nbsp;', '\u00A0')
        .split(/\n{2,}/);
      for (const block of blocks) {
        const lines = block.trim().split('\n');
        if (/^(WEBVTT|NOTE|STYLE|REGION)(\s|$)/.test(lines[0])) continue;
        const timeLine = lines.find(l => l.includes(' --> '));
        if (!timeLine) continue;
        const [startStr, rest] = timeLine.split(' --> ');
        const endStr = rest.split(' ')[0];
        const start = parseTS(startStr);
        const end = parseTS(endStr);
        const textLines = lines.slice(lines.indexOf(timeLine) + 1);
        if (!textLines.length) continue;
        const words = parseWords(textLines.join('\n'), start);
        if (words.length && words.every(w => !w.text.trim())) continue;
        cues.push({ start, end, words });
      }
      return cues;
    }

    function parseTS(s) {
      const parts = s.trim().split(':');
      const secParts = parts.pop().split('.');
      const secs = parseInt(secParts[0]);
      const ms = parseInt((secParts[1] || '0').padEnd(3, '0'));
      let total = secs + ms / 1000;
      if (parts.length) total += parseInt(parts.pop()) * 60;
      if (parts.length) total += parseInt(parts.pop()) * 3600;
      return total;
    }

    const tsPattern = '(?:\\d{2}:)\\d{2}:\\d{2}\\.\\d{3}';
    const tagRe = new RegExp('<(' + tsPattern + ')>|</?(?:c|b|i|u|ruby|rt)(?:\\.[^>]*)?>|</?(?:v|lang)(?:\\s[^>]*)?>','g');

    function parseWords(raw, cueStart) {
      const words = [];
      let currentTime = cueStart;
      let lastIndex = 0;
      let match;
      tagRe.lastIndex = 0;
      while ((match = tagRe.exec(raw)) !== null) {
        const before = raw.slice(lastIndex, match.index);
        if (before) words.push({ text: before, time: currentTime });
        if (match[1]) currentTime = parseTS(match[1]);
        lastIndex = tagRe.lastIndex;
      }
      const tail = raw.slice(lastIndex);
      if (tail) words.push({ text: tail, time: currentTime });
      return words;
    }

    let parsedCues = [];
    let activeTrackLang = null;

    async function loadSubtitles(lang) {
      if (lang === activeTrackLang) return;
      activeTrackLang = lang;
      if (!lang) { parsedCues = []; renderKaraoke(); return; }
      const res = await fetch('/media/subtitles/<# videoId>/' + lang);
      const text = await res.text();
      parsedCues = parseVTT(text);
      renderKaraoke();
    }

    function renderKaraoke() {
      overlay.innerHTML = '';
      if (!parsedCues.length) return;
      const t = video.currentTime;
      for (const cue of parsedCues) {
        if (t < cue.start || t > cue.end) continue;
        const span = document.createElement('span');
        span.className = 'subtitle-cue';
        for (const w of cue.words) {
          const ws = document.createElement('span');
          ws.className = t >= w.time ? 'word spoken' : 'word unspoken';
          ws.textContent = w.text;
          span.appendChild(ws);
        }
        overlay.appendChild(span);
        break;
      }
    }

    video.addEventListener('timeupdate', renderKaraoke);

    let lastSeenTextTrack = 0;
    video.textTracks.addEventListener('change', () => {
      for (let i = 0; i < video.textTracks.length; i++) {
        if (video.textTracks[i].mode === 'showing') {
          lastSeenTextTrack = i;
          loadSubtitles(video.textTracks[i].language);
          return;
        }
      }
      loadSubtitles(null);
    });
    for (const track of video.textTracks) {
      if (track.mode === 'showing') { loadSubtitles(track.language); break; }
    }
    let modalHideTimeout = -1;
    function showModal(html, duration) {
      let modal = document.querySelector('.video-modal-text');
      modal.innerHTML = html;
      modal.style.display = 'initial';
      clearTimeout(modalHideTimeout);
      modalHideTimeout = setTimeout(() => { modal.style.display = 'none'; }, duration);
    }

    const videoSpeeds = [.25, .5, .75, 1, 1.25, 1.5, 1.75, 2, 2.25, 2.5, 2.75, 3];
    document.addEventListener('keydown', (e) => {
      if (!(e.target instanceof HTMLElement)) return;
      let targetName = e.target.nodeName.toLowerCase();
      if (targetName === 'textarea' || targetName === 'input' || targetName === 'select' || e.target.isContentEditable) return;
      if (e.altKey || e.ctrlKey || e.metaKey) return;

      switch (e.key) {
        case 'c': {
          let tracks = [...video.textTracks];
          if (tracks.length === 0) {
            showModal('no subtitles', 500);
            break;
          }
          let active = tracks.find(x => x.mode === 'showing');
          if (active != null) {
            active.mode = 'disabled';
          } else {
            tracks[lastSeenTextTrack].mode = 'showing';
          }
          showModal(active ? 'cc off' : 'cc on', 500);
          break;
        }
        case 'm':
          video.muted = !video.muted;
          showModal(video.muted ? 'muted' : 'ummuted', 500);
          break;
        case 'ArrowLeft':
          e.preventDefault();
          showModal('- 5 seconds', 500);
          video.currentTime -= 5;
          break;
        case 'ArrowRight':
          e.preventDefault();
          showModal('+ 5 seconds', 500);
          video.currentTime += 5;
          break;
        case '<':
        case '>': {
          let currentSpeedIdx = videoSpeeds.findIndex(s => s >= video.playbackRate);
          if (currentSpeedIdx === -1) currentSpeedIdx = videoSpeeds.length - 1;
          let newSpeedIdx = e.key === '<' ? Math.max(0, currentSpeedIdx - 1) : Math.min(videoSpeeds.length - 1, currentSpeedIdx + 1);
          let newSpeed = videoSpeeds[newSpeedIdx];
          video.playbackRate = newSpeed;
          showModal(newSpeed + 'x', 500);
          break;
        }
        case ' ': {
          e.preventDefault();
          if (video.paused) { video.play(); } else { video.pause(); }
          break;
        }
        case '?':
          showModal(`
            <table style="margin: auto; background: rgba(0,0,0,.5)"><tbody>
            <tr><td>Show help</td><td>?</td>
            <tr><td>Toggle mute</td><td>m</td>
            <tr><td>Toggle subtitles</td><td>c</td>
            <tr><td>Increase speed</td><td>&gt;</td>
            <tr><td>Decrease speed</td><td>&lt;</td>
            <tr><td>Back 5 seconds</td><td>←</td>
            <tr><td>Forward 5 seconds</td><td>→</td>
          `, 3000);
          break;
      }
    }, { capture: true });
  </script>
  <div class="content-section">
    <div class="video-container">
    <div class="video-info">
      <div class="video-title"><# videoTitle></div>
      <div class="channel-info">
        <#if hasAvatar>
          <img class="channel-avatar" width=40 height=40 src="/media/avatars/<# channelShortId>.<# avatarExt>" alt="<# channel>">
        </#if>
        <a href="/c/<# channelShortId>" class="channel-name"><# channel></a>
      </div>
      <#if hasManageableUsers>
        <div class="user-visibility-list" id="user-visibility-list">
          <h3>Visibility for managed users</h3>
          <#foreach mu of manageableUsers>
            <div class="user-visibility-row" data-username="<# mu.username>" data-visibility="<# mu.visibilityClass>">
              <span class="vis-username"><# mu.username></span>
              <span class="vis-status"><# mu.visibilityLabel></span>
              <#if mu.showAdd>
                <button type="button" class="visibility-toggle add" data-action="add" title="Grant access">+</button>
              </#if>
              <#if mu.showRemove>
                <button type="button" class="visibility-toggle remove" data-action="remove" title="Revoke access">&times;</button>
              </#if>
            </div>
          </#foreach>
        </div>
        <script>
          (function() {
            const videoId = '<# videoId>';
            const list = document.getElementById('user-visibility-list');

            function confirmModal(message) {
              return new Promise(resolve => {
                const backdrop = document.createElement('div');
                backdrop.className = 'modal-backdrop';
                const box = document.createElement('div');
                box.className = 'modal-box';
                const p = document.createElement('p');
                p.textContent = message;
                const actions = document.createElement('div');
                actions.className = 'modal-actions';
                const cancel = document.createElement('button');
                cancel.className = 'modal-cancel';
                cancel.textContent = 'Cancel';
                const confirm = document.createElement('button');
                confirm.className = 'modal-confirm';
                confirm.textContent = 'Confirm';
                actions.appendChild(cancel);
                actions.appendChild(confirm);
                box.appendChild(p);
                box.appendChild(actions);
                backdrop.appendChild(box);
                document.body.appendChild(backdrop);
                function done(v) {
                  document.removeEventListener('keydown', onKey);
                  backdrop.remove();
                  resolve(v);
                }
                function onKey(e) {
                  if (e.key === 'Escape') done(false);
                  if (e.key === 'Enter') done(true);
                }
                cancel.addEventListener('click', () => done(false));
                confirm.addEventListener('click', () => done(true));
                backdrop.addEventListener('click', e => { if (e.target === backdrop) done(false); });
                document.addEventListener('keydown', onKey);
                confirm.focus();
              });
            }

            list.addEventListener('click', async function(e) {
              const btn = e.target.closest('.visibility-toggle');
              if (!btn) return;
              const row = btn.closest('.user-visibility-row');
              const username = row.dataset.username;
              const action = btn.dataset.action;
              if (!e.shiftKey) {
                const verb = action === 'add' ? 'Grant access for' : 'Revoke access for';
                const ok = await confirmModal(verb + ' ' + username + '?');
                if (!ok) return;
              }
              btn.disabled = true;
              try {
                const resp = await fetch('/api/update-user-allowed-video', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ username, videoId, action }),
                });
                if (!resp.ok) {
                  let msg = 'Failed to update';
                  try { msg = (await resp.json()).message || msg; } catch {}
                  alert(msg);
                  btn.disabled = false;
                  return;
                }
                if (action === 'add') {
                  row.dataset.visibility = 'visible';
                  row.querySelector('.vis-status').textContent = 'visible';
                  btn.dataset.action = 'remove';
                  btn.title = 'Revoke access';
                  btn.textContent = '×';
                  btn.classList.remove('add');
                  btn.classList.add('remove');
                } else {
                  row.dataset.visibility = 'hidden';
                  row.querySelector('.vis-status').textContent = 'hidden';
                  btn.dataset.action = 'add';
                  btn.title = 'Grant access';
                  btn.textContent = '+';
                  btn.classList.remove('remove');
                  btn.classList.add('add');
                }
                btn.disabled = false;
              } catch {
                alert('Network error');
                btn.disabled = false;
              }
            });
          })();
        </script>
      </#if>
      <div class="description"><# videoDescription></div>
    </div>
  </div>
  </div>
</body>
</html>
