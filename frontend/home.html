<!DOCTYPE html>
<html>
<head>
  <title>LocalTube</title>
  <style>
    <# commonCSS>
    body { margin: 20px; }
    h1 { color: #333; margin: 0px; display: inline; }
    .channels-link { color: #1976d2; text-decoration: none; margin-left: 16px; font-size: 16px; vertical-align: middle; }
    .channels-link:hover { text-decoration: underline; }
    .video-grid { margin-top: 20px; }
    .empty-state { text-align: center; color: #666; margin-top: 60px; font-size: 1.1em; }
    .video-title { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>LocalTube</h1> <a href="/channels" class="channels-link">Channels</a>
    <# searchBar>
    <# topRightBlock>
  </div>
  <div class="video-grid" id="video-grid">
    <#foreach video of videos>
      <# video.html>
    </#foreach>
  </div>
  <#if noVideos>
    <div class="empty-state">
      <p>No videos to display. Either no videos have been added yet, or your account doesn't have access to any channels.</p>
    </div>
  </#if>
  <div class="loading" id="loading" style="display: none;">Loading more videos...</div>
  <script>
    <# videoCardScript>
    createInfiniteScroll('/api/videos', true);
  </script>
</body>
</html>
